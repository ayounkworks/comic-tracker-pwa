<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Comic Tracker</title>
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon-192.png" />
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --green:#16a34a;
      --green-dark:#166534;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --red:#b91c1c;
      --soft:#f8fafc;
      --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:16px;
    }

    .card{
      background:var(--card);
      border-radius:24px;
      padding:18px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    h1{
      font-size:22px;
      margin:0 0 14px;
      line-height:1.2;
    }

    h2{
      font-size:18px;
      margin:0 0 10px;
      line-height:1.2;
    }

    input,button,textarea{
      font:inherit;
    }

    input,textarea{
      width:100%;
      padding:14px 16px;
      border:1px solid #d1d5db;
      border-radius:16px;
      margin-bottom:12px;
      background:#fff;
      color:var(--text);
      outline:none;
    }

    input:focus, textarea:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }

    textarea{
      resize:vertical;
      min-height:110px;
    }

    button{
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
    }

    button:active{
      transform:scale(.98);
    }

    .primary{
      background:var(--green);
      color:#fff;
    }

    .primary:hover{
      background:var(--green-dark);
    }

    .secondary{
      background:var(--blue);
      color:#fff;
    }

    .secondary:hover{
      background:var(--blue-dark);
    }

    .ghost{
      background:#eef2ff;
      color:#1e40af;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .row.single{
      grid-template-columns:1fr;
    }

    .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }

    .status-box,
    .result-box{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 16px;
      margin-bottom:14px;
    }

    .status{
      font-size:14px;
      font-weight:700;
      margin:0;
    }

    .result-title{
      font-size:18px;
      font-weight:800;
      line-height:1.3;
      margin:0 0 6px;
    }

    .result-meta{
      font-size:14px;
      color:var(--muted);
      margin:0;
    }

    .section-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    .section-top .meta{
      margin:0;
    }

    .item{
      padding:14px 0;
      border-top:1px solid var(--line);
    }

    .item:first-child{
      border-top:none;
      padding-top:6px;
    }

    .title{
      font-weight:800;
      font-size:15px;
      line-height:1.35;
    }

    .item .meta{
      margin-top:4px;
    }

    a{
      color:var(--blue);
      text-decoration:none;
      font-weight:600;
    }

    .hidden{
      display:none !important;
    }

    .small-btn{
      padding:10px 12px;
      border-radius:14px;
      font-size:14px;
    }

    @media (max-width:560px){
      .row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Comic Tracker</h1>

      <div id="shareNotice" class="meta" style="margin-bottom:12px;"></div>

      <div id="statusBox" class="status-box">
        <p id="status" class="status">Menunggu...</p>
      </div>

      <div id="resultBox" class="result-box hidden">
        <div id="resultTitle" class="result-title">-</div>
        <p id="resultMeta" class="result-meta">Ch -</p>
      </div>

      <div id="shareActions" class="row single hidden" style="margin-bottom:12px;">
        <button id="showManualBtn" class="ghost small-btn">Tampilkan Form Manual</button>
      </div>

      <div id="manualForm">
        <input id="urlInput" placeholder="Paste URL chapter di sini" />
        <input id="titleInput" placeholder="Opsional: judul dari share" />
        <textarea id="textInput" rows="3" placeholder="Opsional: teks dari share"></textarea>

        <div class="row">
          <button id="saveBtn" class="primary">Save URL</button>
          <button id="refreshBtn" class="secondary">Refresh History</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-top">
        <h2 style="margin:0;">Recent History</h2>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZ61TFUxjKS5LzrFIBRRgHLA_U6wUF6kQj7XKQvY0D-QZIVSwasyG4nsQlE-pScuPKKA/exec';
    let autoSavedOnce = false;

    function qs(id){ return document.getElementById(id); }

    async function getJson(url){
      const res = await fetch(url);
      return await res.json();
    }

    function setStatus(text, ok = true){
      const el = qs('status');
      el.textContent = text;
      el.style.color = ok ? '#166534' : '#b91c1c';
    }

    function showManualForm(show){
      const form = qs('manualForm');
      if (form) form.classList.toggle('hidden', !show);
    }

    function showShareActions(show){
      const box = qs('shareActions');
      if (box) box.classList.toggle('hidden', !show);
    }

    function showResult(title, chapter, duplicate){
      const box = qs('resultBox');
      const titleEl = qs('resultTitle');
      const metaEl = qs('resultMeta');

      titleEl.textContent = title || '-';
      metaEl.textContent = duplicate
        ? `Sudah ada di history • Ch ${chapter || '-'}`
        : `Berhasil disimpan • Ch ${chapter || '-'}`;

      box.classList.remove('hidden');
    }

    async function saveSharedUrl(){
      const url = qs('urlInput').value.trim();
      const title = qs('titleInput').value.trim();
      const text = qs('textInput').value.trim();

      if (!url) {
        setStatus('URL kosong.', false);
        return;
      }

      setStatus('Menyimpan...');
      try {
        const endpoint = APPS_SCRIPT_URL +
          '?action=shareSave' +
          '&url=' + encodeURIComponent(url) +
          '&title=' + encodeURIComponent(title) +
          '&text=' + encodeURIComponent(text);

        const result = await getJson(endpoint);

        if (result.ok && result.duplicate) {
          setStatus(`Sudah ada: ${result.masterTitle || '-'} • Ch ${result.chapter || '-'}`);
          showResult(result.masterTitle, result.chapter, true);
        } else if (result.ok) {
          setStatus(`Tersimpan: ${result.masterTitle || '-'} • Ch ${result.chapter || '-'}`);
          showResult(result.masterTitle, result.chapter, false);
        } else {
          setStatus(result.error || 'Gagal simpan.', false);
        }

        await loadRecentHistory();
      } catch (err) {
        setStatus(String(err), false);
      }
    }

    async function loadRecentHistory(){
      const list = qs('historyList');
      list.innerHTML = '<div class="meta">Loading...</div>';

      try {
        const result = await getJson(APPS_SCRIPT_URL + '?action=recentHistory&limit=10');
        if (!result.ok) {
          list.innerHTML = '<div class="meta">Gagal ambil history</div>';
          return;
        }

        const items = result.items || [];
        if (!items.length) {
          list.innerHTML = '<div class="meta">Belum ada history</div>';
          return;
        }

        list.innerHTML = '';
        items.forEach(item => {
          const row = document.createElement('div');
          row.className = 'item';
          row.innerHTML = `
            <div class="title">${escapeHtml(item.masterTitle || item.siteTitle || '-')}</div>
            <div class="meta">${escapeHtml(item.chapter ? 'Ch ' + item.chapter : item.site)} • ${escapeHtml(item.timestamp || '')}</div>
            ${item.url ? `<div class="meta"><a href="${item.url}" target="_blank" rel="noopener">Open</a></div>` : ''}
          `;
          list.appendChild(row);
        });
      } catch (err) {
        list.innerHTML = '<div class="meta">' + escapeHtml(String(err)) + '</div>';
      }
    }

    function escapeHtml(str){
      return String(str || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }

    async function readShareParamsAndAutoSave(){
      const url = new URL(window.location.href);
      const sharedUrl = url.searchParams.get('url') || '';
      const sharedTitle = url.searchParams.get('title') || '';
      const sharedText = url.searchParams.get('text') || '';

      if (sharedUrl || sharedTitle || sharedText) {
        qs('urlInput').value = sharedUrl;
        qs('titleInput').value = sharedTitle;
        qs('textInput').value = sharedText;

        qs('shareNotice').textContent = 'Data share terdeteksi.';
        showManualForm(false);
        showShareActions(true);

        if (!autoSavedOnce && sharedUrl) {
          autoSavedOnce = true;

          try {
            setStatus('Auto-save berjalan...');
            await saveSharedUrl();
          } catch (e) {
            showManualForm(true);
            setStatus('Auto-save gagal. Silakan simpan manual.', false);
          }
        }
      } else {
        qs('shareNotice').textContent = 'Mode manual.';
        showManualForm(true);
        showShareActions(false);
        setStatus('Paste URL lalu simpan.');
      }
    }

    qs('saveBtn').addEventListener('click', saveSharedUrl);
    qs('refreshBtn').addEventListener('click', loadRecentHistory);
    qs('showManualBtn').addEventListener('click', () => {
      showManualForm(true);
      showShareActions(false);
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    window.addEventListener('load', async () => {
      await loadRecentHistory();
      await readShareParamsAndAutoSave();
    });
  </script>
</body>
</html>
