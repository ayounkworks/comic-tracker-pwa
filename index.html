<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw62bX-I2YLh_XuBI-Pmz5RQABjMX9hyW9Qqb8kBlribGTpjYSzLZmDz2evoXF-zLFl_w/exec";

  async function sendSharedUrl() {
    const params = new URLSearchParams(window.location.search);

    const sharedUrl = params.get("url") || "";
    const sharedTitle = params.get("title") || "";
    const sharedText = params.get("text") || "";

    if (!sharedUrl && !sharedTitle && !sharedText) {
      document.getElementById("status").textContent = "Tidak ada link yang diterima.";
      return;
    }

    document.getElementById("status").textContent = "Menyimpan link...";

    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "shareSave",
          url: sharedUrl,
          title: sharedTitle,
          text: sharedText
        })
      });

      const result = await response.text();
      document.getElementById("status").textContent = "Berhasil disimpan.";
      console.log(result);
    } catch (error) {
      document.getElementById("status").textContent = "Gagal menyimpan.";
      console.error(error);
    }
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
  }

  sendSharedUrl();
</script>
