<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comic Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      background: #111;
      color: #fff;
    }
  </style>
</head>
<body>
  <h2>Comic Tracker</h2>
  <p id="status">Memulai...</p>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyG7LtlfV9ZGNwTTT0-BEEy2EEPK4mogV58crY7CXFdpF8-n4mCWDz9V-rgqTWTYcfVdA/exec";

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function extractFirstUrl(text) {
      const s = String(text || "");
      const m = s.match(/https?:\/\/\S+/i);
      return m ? m[0] : "";
    }

    async function sendSharedUrl() {
      try {
        const params = new URLSearchParams(window.location.search);

        const sharedTitle = params.get("title") || "";
        const sharedText = params.get("text") || "";
        const sharedUrl = params.get("url") || extractFirstUrl(sharedText) || "";

        if (!sharedUrl) {
          setStatus("URL kosong");
          return;
        }

        setStatus("Menyimpan...");

        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "shareSave",
            url: sharedUrl,
            title: sharedTitle,
            text: sharedText
          })
        });

       const resultText = await response.text();
let result = null;

try {
  result = JSON.parse(resultText);
} catch (e) {}

if (result && result.ok) {
  setStatus("Tersimpan");
  setTimeout(() => {
    window.close();
  }, 400);
} else {
  setStatus("Gagal menyimpan\n" + resultText);
}
      } catch (err) {
        setStatus("Error");
      }
    }

    sendSharedUrl();
  </script>
</body>
</html>
