<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comic Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      background: #111;
      color: #fff;
    }
  </style>
</head>
<body>
  <h2>Comic Tracker</h2>
  <p id="status">Memulai...</p>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyi9iEg_jj0x6ko9CefLmzgsUNNd874Of9lpw3SZsYJya2pSUze-kfF4ZSrvhPTURK_RA/exec";

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function extractFirstUrl(text) {
      const s = String(text || "");
      const m = s.match(/https?:\/\/\S+/i);
      return m ? m[0] : "";
    }

    async function sendSharedUrl() {
      try {
        const params = new URLSearchParams(window.location.search);

        const sharedTitle = params.get("title") || "";
        const sharedText = params.get("text") || "";
        const sharedUrl = params.get("url") || extractFirstUrl(sharedText) || "";

        if (!sharedUrl) {
          setStatus("URL kosong");
          return;
        }

        setStatus("Menyimpan...");

        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "shareSave",
            url: sharedUrl,
            title: sharedTitle,
            text: sharedText
          })
        });

        const resultText = await response.text();
        let ok = false;

        try {
          const result = JSON.parse(resultText);
          ok = !!result.ok;
        } catch (e) {}

        if (ok) {
          setStatus("Tersimpan");
          setTimeout(() => {
            window.close();
          }, 400);
        } else {
          setStatus("Gagal");
        }
      } catch (err) {
        setStatus("Error");
      }
    }

    sendSharedUrl();
  </script>
</body>
</html>
