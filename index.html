<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comic Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
</head>
<body>
  <h2>Comic Tracker</h2>
  <p id="status">Menerima link...</p>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw62bX-I2YLh_XuBI-Pmz5RQABjMX9hyW9Qqb8kBlribGTpjYSzLZmDz2evoXF-zLFl_w/exec";

    async function sendSharedUrl() {
      const params = new URLSearchParams(window.location.search);

      const sharedUrl = params.get("url") || "";
      const sharedTitle = params.get("title") || "";
      const sharedText = params.get("text") || "";

      const statusEl = document.getElementById("status");

      statusEl.textContent =
        "Debug | title: " + (sharedTitle || "[kosong]") +
        " | text: " + (sharedText || "[kosong]") +
        " | url: " + (sharedUrl || "[kosong]");

      if (!sharedUrl && !sharedTitle && !sharedText) {
        statusEl.textContent = "Tidak ada link yang diterima.";
        return;
      }

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "shareSave",
            url: sharedUrl,
            title: sharedTitle,
            text: sharedText
          })
        });

        const resultText = await response.text();
        console.log("Response:", resultText);

        try {
          const result = JSON.parse(resultText);
          if (result.ok) {
            statusEl.textContent =
              "Berhasil disimpan | title: " + (sharedTitle || "[kosong]") +
              " | text: " + (sharedText || "[kosong]") +
              " | url: " + (sharedUrl || "[kosong]");
          } else {
            statusEl.textContent = "Gagal: " + (result.error || "unknown error");
          }
        } catch (err) {
          statusEl.textContent = "Response tidak valid: " + resultText;
        }
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Gagal menyimpan.";
      }
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }

    sendSharedUrl();
  </script>
</body>
</html>
